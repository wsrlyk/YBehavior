<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="32" y="32" width="448" height="448" rx="64" fill="url(#bg)"/>
  <!-- AI 文字 -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="white" text-anchor="middle">AI</text>
  <!-- 底部小字 YB -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle">YB</text>
</svg>
